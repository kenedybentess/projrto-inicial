<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EMPRESARIAL BENTES STOCK PRO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#eef3f8}
header{background:linear-gradient(90deg,#0f3d91,#1d5ed8);color:#fff;padding:20px;box-shadow:0 3px 10px rgba(0,0,0,.15)}
header h1{font-size:28px}
#alertaCritico{display:none;background:#ffdddd;color:#b30000;padding:15px;margin:15px;border-left:6px solid red;border-radius:10px;font-weight:bold}
.wrap{max-width:1300px;margin:auto;padding:20px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;margin-bottom:20px}.card{background:#fff;padding:20px;border-radius:14px;box-shadow:0 4px 10px rgba(0,0,0,.08)}
input,select,button{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:1px solid #ccc}button{background:#0f3d91;color:#fff;border:none;cursor:pointer}table{width:100%;border-collapse:collapse;background:#fff}th{background:#0f3d91;color:#fff;padding:12px}td{padding:10px;border-bottom:1px solid #eee}.ok{color:green;font-weight:bold}.alerta{color:red;font-weight:bold}
</style>
</head>
<body>
<header><h1>EMPRESARIAL BENTES STOCK PRO</h1><p>Usuário logado: kenedy</p></header>
<div id="alertaCritico">⚠ Atenção! Existem itens críticos no estoque.</div>
<div class="wrap">
<div class="grid">
<div class="card"><small>Total Produtos</small><h2 id="produtos">0</h2></div>
<div class="card"><small>Itens Críticos</small><h2 id="criticos">0</h2></div>
<div class="card"><small>Movimentações</small><h2 id="movs">0</h2></div>
</div>
<div class="card"><input id="busca" placeholder="Buscar produto..." onkeyup="carregar()"></div>
<div class="card"><table><thead><tr><th>Produto</th><th>Saldo</th><th>Status</th></tr></thead><tbody id="estoque"></tbody></table></div>
</div>
<script>
let estoque=JSON.parse(localStorage.getItem('estoque_bentes')||'{}');
function carregar(){let busca=(document.getElementById('busca')?.value||'').toLowerCase();let html='',total=0,crit=0;for(let p in estoque){if(!p.toLowerCase().includes(busca))continue;let item=estoque[p];total++;let status=item.saldo<=item.minimo?"<span class='alerta'>REPOR</span>":"<span class='ok'>OK</span>";if(item.saldo<=item.minimo)crit++;html+=`<tr><td>${p}</td><td>${item.saldo}</td><td>${status}</td></tr>`;}document.getElementById('estoque').innerHTML=html;document.getElementById('produtos').innerText=total;document.getElementById('criticos').innerText=crit;document.getElementById('movs').innerText=0;document.getElementById('alertaCritico').style.display=crit>0?'block':'none';}
carregar();
</script>
</body>
</html>
