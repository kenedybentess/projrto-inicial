<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bentes Stock PRO v4.0 Empresa</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#eef3f8;color:#222}header{background:#0f3d91;color:#fff;padding:18px}.wrap{max-width:1300px;margin:auto;padding:20px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}.card{background:#fff;border-radius:16px;padding:18px;box-shadow:0 4px 12px rgba(0,0,0,.08)}input,select,button{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:1px solid #ccc}button{background:#0f3d91;color:#fff;border:none;cursor:pointer}.danger{background:#c62828}table{width:100%;border-collapse:collapse}th,td{padding:10px;border-bottom:1px solid #eee}th{background:#0f3d91;color:#fff}.tag{padding:4px 8px;border-radius:999px}.ok{background:#e8f5e9;color:#2e7d32}.low{background:#ffebee;color:#c62828}
</style>
</head>
<body>
<header><h1>Bentes Stock PRO v4.0 Empresa</h1><div>Admin • Multiusuário • Backup Local • Relatórios</div></header>
<div class='wrap'>
<div class='grid'>
<div class='card'><small>Total Produtos</small><h2 id='tp'>0</h2></div>
<div class='card'><small>Itens Críticos</small><h2 id='tc'>0</h2></div>
<div class='card'><small>Movimentações</small><h2 id='tm'>0</h2></div>
<div class='card'><canvas id='graf' height='120'></canvas></div>
</div>
<div class='card'><h3>Cadastro / Movimento</h3>
<div class='grid'>
<input id='produto' placeholder='Produto'>
<input id='descricao' placeholder='Descrição'>
<input id='codigo' placeholder='Código / Barras'>
<select id='tipo'><option>Entrada</option><option>Saída</option></select>
<input id='qtd' type='number' placeholder='Quantidade'>
<input id='min' type='number' placeholder='Mínimo'>
</div>
<button onclick='salvar()'>Salvar</button>
</div>
<div class='card'><h3>Relatórios</h3><button onclick='baixarJSON()'>Backup JSON</button><button onclick='window.print()'>Imprimir / PDF</button></div>
<div class='card'><h3>Estoque Atual</h3><table><thead><tr><th>Produto</th><th>Código</th><th>Saldo</th><th>Status</th><th>Ações</th></tr></thead><tbody id='tb'></tbody></table></div>
</div>
<script>
let db=JSON.parse(localStorage.getItem('bentes_v4')||'{"estoque":{},"hist":[]}');let chart;
function persist(){localStorage.setItem('bentes_v4',JSON.stringify(db))}
function salvar(){const p=produto.value.trim();const d=descricao.value.trim();const c=codigo.value.trim();const q=parseInt(qtd.value);const m=parseInt(min.value)||0;const t=tipo.value;if(!p||!c||isNaN(q)) return alert('Preencha corretamente');if(!db.estoque[p])db.estoque[p]={descricao:d,codigo:c,saldo:0,minimo:m};db.estoque[p].descricao=d;db.estoque[p].codigo=c;db.estoque[p].minimo=m;db.estoque[p].saldo += t==='Entrada'?q:-q;if(db.estoque[p].saldo<0)db.estoque[p].saldo=0;db.hist.push({data:new Date().toLocaleString(),produto:p,tipo:t,qtd:q});persist();render();}
function delp(p){delete db.estoque[p];persist();render()}
function render(){let html='',crit=0,total=0;const labels=[],vals=[];for(const p in db.estoque){const i=db.estoque[p];total++;labels.push(p);vals.push(i.saldo);const low=i.saldo<=i.minimo;if(low)crit++;html+=`<tr><td>${p}</td><td>${i.codigo}</td><td>${i.saldo}</td><td><span class='tag ${low?'low':'ok'}'>${low?'REPOR':'OK'}</span></td><td><button class='danger' onclick='delp(${JSON.stringify(p)})'>Excluir</button></td></tr>`}tb.innerHTML=html;tp.innerText=total;tc.innerText=crit;tm.innerText=db.hist.length;const ctx=graf.getContext('2d');if(chart)chart.destroy();chart=new Chart(ctx,{type:'bar',data:{labels,datasets:[{data:vals,label:'Saldo'}]},options:{plugins:{legend:{display:false}},responsive:true}})}
function baixarJSON(){const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='backup-bentes.json';a.click();}
render();
</script>
</body></html>
