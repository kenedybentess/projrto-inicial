<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EMPRESARIAL BENTES STOCK PRO</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#eef3f8}
header{
background:linear-gradient(90deg,#0f3d91,#1d5ed8);
color:#fff;
padding:20px;
box-shadow:0 3px 10px rgba(0,0,0,.15);
}
header h1{font-size:28px}
.wrap{max-width:1300px;margin:auto;padding:20px}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:#fff;
padding:20px;
border-radius:14px;
box-shadow:0 4px 10px rgba(0,0,0,.08);
}

.card h2{margin-top:10px;color:#0f3d91}

input,select,button{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#0f3d91;
color:#fff;
border:none;
cursor:pointer;
font-weight:bold;
}

button:hover{background:#082c6e}

table{
width:100%;
border-collapse:collapse;
background:#fff;
border-radius:12px;
overflow:hidden;
}

th{
background:#0f3d91;
color:#fff;
padding:12px;
}

td{
padding:10px;
border-bottom:1px solid #eee;
}

.ok{color:green;font-weight:bold}
.alerta{color:red;font-weight:bold}

.acoes{
display:flex;
gap:5px;
}

.busca{
margin-bottom:15px;
}

small{color:#777}
</style>
</head>
<body>

<script>
const login = localStorage.getItem("login_bentes");

if(login !== "ok"){
let u = prompt("Usuário:");
let s = prompt("Senha:");

if(u=="kenedy" && s=="220718"){
localStorage.setItem("login_bentes","ok");
}else{
alert("Acesso negado");
location.reload();
}
}
</script>

<header>
<h1>EMPRESARIAL BENTES STOCK PRO</h1>
<p>Usuário logado: kenedy</p>
</header>

<div class="wrap">

<div class="grid">
<div class="card"><small>Total Produtos</small><h2 id="produtos">0</h2></div>
<div class="card"><small>Itens Críticos</small><h2 id="criticos">0</h2></div>
<div class="card"><small>Movimentações</small><h2 id="movs">0</h2></div>
<div class="card"><small>Status</small><h2>ONLINE</h2></div>
</div>

<div class="card">
<h3>Cadastro / Movimentação</h3>

<input id="produto" placeholder="Produto">
<input id="descricao" placeholder="Descrição">
<input id="codigo" placeholder="Código">
<select id="tipo">
<option>Entrada</option>
<option>Saída</option>
</select>
<input id="qtd" type="number" placeholder="Quantidade">
<input id="minimo" type="number" placeholder="Estoque mínimo">
<button onclick="salvar()">Salvar</button>
</div>

<div class="card">
<h3>Busca</h3>
<input class="busca" id="busca" placeholder="Buscar produto..." onkeyup="carregar()">
</div>

<div class="card">
<h3>Estoque Atual</h3>
<table>
<thead>
<tr>
<th>Produto</th>
<th>Descrição</th>
<th>Código</th>
<th>Saldo</th>
<th>Status</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="estoque"></tbody>
</table>
</div>

<div class="card">
<h3>Histórico</h3>
<table>
<thead>
<tr>
<th>Data</th>
<th>Produto</th>
<th>Tipo</th>
<th>Qtd</th>
</tr>
</thead>
<tbody id="historico"></tbody>
</table>
</div>

</div>

<script>
let estoque = JSON.parse(localStorage.getItem("estoque_bentes") || "{}");
let historico = JSON.parse(localStorage.getItem("historico_bentes") || "[]");

function salvar(){

let produto = produtoInput("produto");
let descricao = produtoInput("descricao");
let codigo = produtoInput("codigo");
let tipo = produtoInput("tipo");
let qtd = parseInt(produtoInput("qtd"));
let minimo = parseInt(produtoInput("minimo")) || 0;

if(!produto || !codigo || !qtd){
alert("Preencha os campos");
return;
}

if(!estoque[produto]){
estoque[produto]={
descricao:descricao,
codigo:codigo,
saldo:0,
minimo:minimo
};
}

estoque[produto].descricao=descricao;
estoque[produto].codigo=codigo;
estoque[produto].minimo=minimo;

if(tipo=="Entrada"){
estoque[produto].saldo += qtd;
}else{
estoque[produto].saldo -= qtd;
if(estoque[produto].saldo<0) estoque[produto].saldo=0;
}

historico.push({
data:new Date().toLocaleString(),
produto,
tipo,
qtd
});

salvarLocal();
location.reload();
}

function produtoInput(id){
return document.getElementById(id).value.trim();
}

function salvarLocal(){
localStorage.setItem("estoque_bentes",JSON.stringify(estoque));
localStorage.setItem("historico_bentes",JSON.stringify(historico));
}

function excluir(prod){
if(confirm("Excluir produto?")){
delete estoque[prod];
salvarLocal();
location.reload();
}
}

function carregar(){

let busca = document.getElementById("busca").value.toLowerCase();

let html="";
let total=0;
let crit=0;

for(let p in estoque){

if(!p.toLowerCase().includes(busca)) continue;

let item = estoque[p];
total++;

let status = item.saldo <= item.minimo ?
"<span class='alerta'>REPOR</span>" :
"<span class='ok'>OK</span>";

if(item.saldo <= item.minimo) crit++;

html += `
<tr>
<td>${p}</td>
<td>${item.descricao}</td>
<td>${item.codigo}</td>
<td>${item.saldo}</td>
<td>${status}</td>
<td class="acoes">
<button onclick="excluir('${p}')">Excluir</button>
</td>
</tr>
`;
}

document.getElementById("estoque").innerHTML = html;
document.getElementById("produtos").innerText = total;
document.getElementById("criticos").innerText = crit;
document.getElementById("movs").innerText = historico.length;

let hist="";

historico.slice().reverse().forEach(h=>{
hist += `
<tr>
<td>${h.data}</td>
<td>${h.produto}</td>
<td>${h.tipo}</td>
<td>${h.qtd}</td>
</tr>
`;
});

document.getElementById("historico").innerHTML = hist;
}

carregar();
</script>

</body>
</html>
