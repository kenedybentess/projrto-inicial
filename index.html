<!-- SUBSTITUA TODO O BLOCO <script> PRINCIPAL PELO CÓDIGO ABAIXO -->

<script>
let estoque = JSON.parse(localStorage.getItem("estoque_bentes") || "{}");
let historico = JSON.parse(localStorage.getItem("historico_bentes") || "[]");

/* =========================
   AUTO PREENCHER PELO CÓDIGO
========================= */
function buscarProduto(){

 let codigo = document.getElementById("codigo").value.trim();
 let tipo = document.getElementById("tipo").value;

 for(let p in estoque){

   if(estoque[p].codigo == codigo){

      document.getElementById("produto").value = p;
      document.getElementById("descricao").value =
      estoque[p].descricao;

      /* QUANDO FOR SAÍDA */
      if(tipo == "Saída"){
         document.getElementById("qtd").value = "";
         document.getElementById("qtd").placeholder =
         "Saldo atual: " + estoque[p].saldo;
      }

      return;
   }
 }

 document.getElementById("produto").value = "";
 document.getElementById("descricao").value = "";
}

/* =========================
   TROCAR ENTRADA / SAÍDA
========================= */
function trocarModo(){

 let tipo = document.getElementById("tipo").value;

 if(tipo == "Saída"){

   document.getElementById("produto").readOnly = true;
   document.getElementById("descricao").readOnly = true;

   document.getElementById("produto").placeholder =
   "Automático";

   document.getElementById("descricao").placeholder =
   "Automático";

 }else{

   document.getElementById("produto").readOnly = false;
   document.getElementById("descricao").readOnly = false;

   document.getElementById("produto").placeholder =
   "Produto";

   document.getElementById("descricao").placeholder =
   "Descrição do Produto";
 }
}

/* =========================
   SALVAR
========================= */
function salvar(){

 let produto = document.getElementById("produto").value.trim();
 let descricao = document.getElementById("descricao").value.trim();
 let codigo = document.getElementById("codigo").value.trim();
 let tipo = document.getElementById("tipo").value;
 let qtd = parseInt(document.getElementById("qtd").value);
 let minimo = parseInt(document.getElementById("minimo").value) || 0;

 if(!codigo || !qtd){
   alert("Preencha código e quantidade.");
   return;
 }

 /* ENTRADA */
 if(tipo == "Entrada"){

   if(!produto || !descricao){
      alert("Preencha produto e descrição.");
      return;
   }

   if(!estoque[produto]){
      estoque[produto] = {
        descricao:descricao,
        codigo:codigo,
        saldo:0,
        minimo:minimo
      };
   }

   estoque[produto].descricao = descricao;
   estoque[produto].codigo = codigo;
   estoque[produto].minimo = minimo;
   estoque[produto].saldo += qtd;
 }

 /* SAÍDA */
 else{

   let achou = false;

   for(let p in estoque){

      if(estoque[p].codigo == codigo){

         estoque[p].saldo -= qtd;

         if(estoque[p].saldo < 0){
            estoque[p].saldo = 0;
         }

         produto = p;
         descricao = estoque[p].descricao;

         achou = true;
         break;
      }
   }

   if(!achou){
      alert("Código não encontrado.");
      return;
   }
 }

 historico.push({
   data:new Date().toLocaleString(),
   produto,
   tipo,
   qtd
 });

 localStorage.setItem("estoque_bentes", JSON.stringify(estoque));
 localStorage.setItem("historico_bentes", JSON.stringify(historico));

 location.reload();
}

/* =========================
   RESTANTE DO SISTEMA
========================= */
function excluirProduto(produto){

 if(confirm("Deseja excluir " + produto + "?")){
   delete estoque[produto];
   localStorage.setItem("estoque_bentes", JSON.stringify(estoque));
   location.reload();
 }
}

function editarProduto(produto){

 let novoNome = prompt("Novo nome:", produto);
 if(!novoNome) return;

 let novaDescricao = prompt("Descrição:", estoque[produto].descricao);
 let novoCodigo = prompt("Novo código:", estoque[produto].codigo);
 let novoMinimo = prompt("Novo mínimo:", estoque[produto].minimo);

 estoque[novoNome] = {
   descricao:novaDescricao,
   codigo:novoCodigo,
   saldo:estoque[produto].saldo,
   minimo:parseInt(novoMinimo)
 };

 if(novoNome !== produto){
   delete estoque[produto];
 }

 localStorage.setItem("estoque_bentes", JSON.stringify(estoque));

 location.reload();
}

function carregar(){

 let html = "";
 let crit = 0;
 let total = 0;

 for(let p in estoque){

   total++;

   let item = estoque[p];

   let status = item.saldo <= item.minimo
   ? "<span class='alerta'>REPOR</span>"
   : "<span class='ok'>OK</span>";

   if(item.saldo <= item.minimo) crit++;

   html += `
   <tr>
     <td>${p}</td>
     <td>${item.descricao}</td>
     <td>${item.codigo}</td>
     <td>${item.saldo}</td>
     <td>${item.minimo}</td>
     <td>${status}</td>
     <td class="acoes">
       <button onclick="editarProduto('${p}')">Editar</button>
       <button onclick="excluirProduto('${p}')">Excluir</button>
     </td>
   </tr>
   `;
 }

 document.getElementById("estoque").innerHTML = html;
 document.getElementById("produtos").innerText = total;
 document.getElementById("criticos").innerText = crit;
 document.getElementById("movs").innerText = historico.length;

 let hist = "";

 historico.slice().reverse().forEach(h=>{

   hist += `
   <tr>
     <td>${h.data}</td>
     <td>${h.produto}</td>
     <td>${h.tipo}</td>
     <td>${h.qtd}</td>
   </tr>
   `;
 });

 document.getElementById("historico").innerHTML = hist;
}

carregar();
trocarModo();

/* EVENTOS */
document.getElementById("codigo").addEventListener("input",buscarProduto);
document.getElementById("tipo").addEventListener("change",trocarModo);
</script>
