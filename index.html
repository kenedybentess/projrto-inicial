<!-- index.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Controle de Materiais Bentes</title>
<style>
body{margin:0;font-family:Arial;background:#eef3f8}
header{background:#0f3d91;color:#fff;padding:20px}
.wrap{max-width:1100px;margin:auto;padding:20px}
.card{background:#fff;border-radius:14px;padding:18px;margin:10px 0;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
input,select,button{padding:10px;border-radius:8px;border:1px solid #ccc;width:100%}
button{background:#0f3d91;color:#fff;border:none;cursor:pointer}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #eee;text-align:left}
small{color:#666}
</style>
</head>
<body>

<header>
<h1>Controle de Materiais Bentes</h1>
<p>Login: kenedy</p>
</header>

<div class="wrap">

<div class="grid">
<div class="card"><small>Total Itens</small><h2 id="totalItens">0</h2></div>
<div class="card"><small>Estoque Crítico</small><h2 id="criticos">0</h2></div>
<div class="card"><small>Usuário</small><h2>kenedy</h2></div>
</div>

<div class="card">
<h3>Nova Movimentação</h3>
<div class="grid">
<input id="material" placeholder="Material">
<select id="tipo">
<option>Entrada</option>
<option>Saída</option>
</select>
<input id="qtd" type="number" placeholder="Quantidade">
</div>
<br>
<button onclick="salvar()">Salvar</button>
</div>

<div class="card">
<h3>Últimos Registros</h3>
<table>
<thead>
<tr>
<th>Data</th>
<th>Material</th>
<th>Tipo</th>
<th>Qtd</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>
</div>

</div>

<script>
const senhaSistema = "220718";

if(prompt("Digite a senha:") !== senhaSistema){
  alert("Senha incorreta");
  location.reload();
}

let dados = JSON.parse(localStorage.getItem("movs") || "[]");

function atualizar(){
  let html = "";
  dados.reverse().forEach(r=>{
    html += `<tr>
      <td>${r.data}</td>
      <td>${r.material}</td>
      <td>${r.tipo}</td>
      <td>${r.qtd}</td>
    </tr>`;
  });
  document.getElementById("lista").innerHTML = html;

  document.getElementById("totalItens").innerText = dados.length;
  document.getElementById("criticos").innerText = "0";
}

function salvar(){
  const material = document.getElementById("material").value;
  const tipo = document.getElementById("tipo").value;
  const qtd = document.getElementById("qtd").value;

  if(!material || !qtd){
    alert("Preencha os campos");
    return;
  }

  dados.push({
    data:new Date().toLocaleDateString(),
    material,
    tipo,
    qtd
  });

  localStorage.setItem("movs", JSON.stringify(dados));
  location.reload();
}

atualizar();
</script>

</body>
</html>
