<!-- MELHORIAS PREMIUM - COLE NO SEU SISTEMA -->

<!-- =====================================
1) CAMPO PESQUISA (coloque acima da tabela estoque)
===================================== -->

<div class="card">
<h3>Pesquisar Produto</h3>
<input id="pesquisa" placeholder="Digite nome, código ou descrição">
</div>

<!-- =====================================
2) BOTÃO EXPORTAR
===================================== -->

<button onclick="exportarCSV()">Exportar Excel</button>

<!-- =====================================
3) ESTILO PREMIUM
===================================== -->

<style>
body{
 background:linear-gradient(135deg,#eef3f8,#dfe9f7);
}

.card{
 border-left:5px solid #0f3d91;
 transition:.2s;
}

.card:hover{
 transform:translateY(-3px);
 box-shadow:0 6px 14px rgba(0,0,0,.12);
}

.alerta{
 color:#fff;
 background:red;
 padding:4px 8px;
 border-radius:8px;
 animation:pulse 1s infinite;
}

@keyframes pulse{
 0%{opacity:1}
 50%{opacity:.5}
 100%{opacity:1}
}
</style>

<!-- =====================================
4) SCRIPT PREMIUM
===================================== -->

<script>

/* PESQUISA AUTOMÁTICA */
document.getElementById("pesquisa").addEventListener("keyup",function(){

 let termo = this.value.toLowerCase();
 let linhas = document.querySelectorAll("#estoque tr");

 linhas.forEach(linha=>{

   let texto = linha.innerText.toLowerCase();

   linha.style.display =
   texto.includes(termo) ? "" : "none";

 });

});

/* EXPORTAR CSV */
function exportarCSV(){

 let csv = "Produto,Descricao,Codigo,Saldo,Minimo\n";

 for(let p in estoque){

   let i = estoque[p];

   csv += `${p},${i.descricao},${i.codigo},${i.saldo},${i.minimo}\n`;
 }

 let blob = new Blob([csv], {type:"text/csv"});
 let a = document.createElement("a");

 a.href = URL.createObjectURL(blob);
 a.download = "estoque_bentes.csv";
 a.click();
}

/* ENTER SALVA NA SAÍDA */
document.getElementById("qtd").addEventListener("keypress",function(e){

 if(e.key === "Enter"){

   if(document.getElementById("tipo").value=="Saída"){
      salvar();
   }

 }

});

/* SOM SONORO */
function beep(){
 let audio = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
 audio.play();
}

/* AUTO SOM AO SALVAR */
const salvarOriginal = salvar;

salvar = function(){
 salvarOriginal();
 beep();
}

</script>
